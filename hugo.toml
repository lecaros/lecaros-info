baseURL = 'https://lecaros.info/'
languageCode = 'en-us'
title = 'José Lecaros Cisterna'
theme = 'PaperMod'

[params]
  defaultTheme = 'auto'
  ShowShareButtons = true
  ShowReadingTime = false

  # This creates the clean, centralized "Linktree" style homepage we designed
  [params.profileMode]
    enabled = true
    title = "Hi, I'm José Lecaros Cisterna 👋"
    subtitle = "Staff Technical Support Engineer specializing in Telemetry & Observability.\nWith over 20 years of experience, I help organizations build robust data pipelines and actively contribute to the Fluent community.\nBased in Chile 🇨🇱."
    imageUrl = "https://github.com/lecaros.png"
    imageTitle = "José Lecaros"
    imageWidth = 150
    imageHeight = 150

    # Social / External Links
    [[params.profileMode.buttons]]
      name = "GitHub"
      url = "https://github.com/lecaros"
    [[params.profileMode.buttons]]
      name = "LinkedIn"
      url = "https://linkedin.com/in/lecaros-cl"
  [[params.profileMode.buttons]]
    name = "Verified Credentials (Credly)"
    url = "https://www.credly.com/users/lecaros"

  # Add one entry per talk you want to surface on the homepage.
   [[params.talks]]
     title = "Parsing 101 with Fluent Bit"
     event = "Online Webinar"
     date = "2024-07-24"
     videoId = "PZaL70vaCrg"
     url = "https://www.youtube.com/watch?v=PZaL70vaCrg"
     description = "Learn the basics of parsing with Fluent Bit and how to use it to extract data from logs."
     thumbnail = "https://img.youtube.com/vi/PZaL70vaCrg/hqdefault.jpg"

[menu]
  # Top navigation bar
  [[menu.main]]
    identifier = "github"
    name = "GitHub"
    url = "https://github.com/lecaros"
    weight = 10
